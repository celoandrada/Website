<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CELO Logo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: transparent;
      overflow: hidden;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
    }

    .hero {
      width: 100%;
      height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
      background: transparent;
    }

    .hero-logo {
      font-size: clamp(90px, 16vw, 230px);
      font-weight: 900;
      letter-spacing: -0.08em;
      color: transparent;
      -webkit-text-stroke: 2px rgba(255, 255, 255, 0.55);
      background: linear-gradient(
        120deg,
        rgba(255,255,255,0.15),
        rgba(255,255,255,0.85),
        rgba(255,255,255,0.2)
      );
      -webkit-background-clip: text;
      background-clip: text;
      filter: drop-shadow(0 0 22px rgba(255,255,255,0.28));
      animation: floatLogo 5s ease-in-out infinite, shine 6s linear infinite;
      background-size: 220% auto;
    }

    .hero-subtitle {
      margin-top: 18px;
      text-align: center;
      color: rgba(255,255,255,0.65);
      font-size: clamp(14px, 2vw, 22px);
      letter-spacing: 0.08em;
      animation: fadePulse 4s ease-in-out infinite;
    }

    .content {
      text-align: center;
      transform: translateY(-20px);
    }

    @keyframes floatLogo {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-14px) scale(1.025);
      }
    }

    @keyframes shine {
      0% {
        background-position: -150% center;
      }
      100% {
        background-position: 150% center;
      }
    }

    @keyframes fadePulse {
      0%, 100% {
        opacity: 0.55;
      }
      50% {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="content">
      <h1 class="hero-logo">CELO</h1>
      <p class="hero-subtitle">Marketing × Analytics × Technology</p>
    </div>
  </section>
</body>
</html>
