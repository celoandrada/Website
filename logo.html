<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marcelo Logo</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: transparent;
  overflow: hidden;
  display: grid;
  place-items: center;
  font-family: Arial, Helvetica, sans-serif;
}

.hero {
  width: 100%;
  height: 100vh;
  display: grid;
  place-items: center;
  background: transparent;
}

.content {
  text-align: center;
  transform: translateY(-20px);
}

.hero-logo {
  font-size: clamp(70px, 13vw, 210px);
  font-weight: 300;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: transparent;

  -webkit-text-stroke: 1.4px rgba(255,255,255,0.58);

  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.95), transparent 18%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.55), transparent 22%),
    linear-gradient(
      115deg,
      rgba(255,255,255,0.05),
      rgba(255,255,255,0.78),
      rgba(255,255,255,0.12),
      rgba(255,255,255,0.55),
      rgba(255,255,255,0.04)
    );

  background-size: 180% 180%, 220% 220%, 260% auto;
  -webkit-background-clip: text;
  background-clip: text;

  filter:
    drop-shadow(0 0 12px rgba(255,255,255,0.22))
    drop-shadow(0 0 35px rgba(255,255,255,0.10));

  animation:
    liquidFloat 6s ease-in-out infinite,
    liquidMove 7s ease-in-out infinite,
    liquidGlow 4s ease-in-out infinite;
}

.hero-subtitle {
  margin-top: 22px;
  color: rgba(255,255,255,0.58);
  font-size: clamp(10px, 1.4vw, 18px);
  letter-spacing: 0.55em;
  text-transform: uppercase;
  animation: fadePulse 5s ease-in-out infinite;
}

@keyframes liquidFloat {
  0%, 100% {
    transform: translateY(0) scale(1);
  }
  50% {
    transform: translateY(-10px) scale(1.015);
  }
}

@keyframes liquidMove {
  0% {
    background-position: 0% 45%, 100% 55%, -160% center;
  }
  50% {
    background-position: 90% 55%, 10% 45%, 80% center;
  }
  100% {
    background-position: 0% 45%, 100% 55%, 160% center;
  }
}

@keyframes liquidGlow {
  0%, 100% {
    opacity: 0.78;
    filter:
      drop-shadow(0 0 12px rgba(255,255,255,0.20))
      drop-shadow(0 0 35px rgba(255,255,255,0.08));
  }
  50% {
    opacity: 1;
    filter:
      drop-shadow(0 0 18px rgba(255,255,255,0.35))
      drop-shadow(0 0 55px rgba(255,255,255,0.16));
  }
}

@keyframes fadePulse {
  0%, 100% {
    opacity: 0.42;
  }
  50% {
    opacity: 0.9;
  }
}
</style>
</head>

<body>
  <section class="hero">
    <div class="content">
      <h1 class="hero-logo">MARCELO</h1>
      <p class="hero-subtitle">Marketing × Analytics × Technology</p>
    </div>
  </section>
</body>
</html>
